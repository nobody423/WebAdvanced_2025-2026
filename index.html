<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webadvanced</title>
    <link rel="stylesheet" href="src/style.css">
    <link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet">
  </head>
  <body>
    <div id="app">

      
    <section class="search-panel">
    <h1>Pokedex</h1>
    <button id="switch-theme">🌓 Switch Theme</button>

    <button id="allBtn">See all</button>
    <br><br>

    
    <form id="searchForm">
      <p>Search Pokemon</p>
      <input type="text" id="pokemonName" placeholder="Enter pokemon name">
      <button type="submit" id="searchBtn" onclick="fetchPokemon()">Search</button>
      <span id="validation-message" style="color: red; display: block; margin-top: 5px"></span>
    </form>

    <div id="singleResult">
      <img src="" alt="Pokemon Sprite" id="pokemonSprite">
      <div id="singleResultDisplay"></div>
      <button id="addFavorite">Add to Favourites</button>
    </div>

    </section>

    <section class="control-panel">

      <label for="typeFilter"></label>
      <select id="typeFilter">
        <option value="">All types</option>
        <option value="fire">Fire</option>
        <option value="water">Water</option>
        <option value="grass">Grass</option>
        <option value="electric">Electric</option>
      </select>
      

      <select id="statSorter">
        <option value="">Sort by...</option>
        <option value="id-asc">ID</option>
        <option value="name-asc">Name</option>
        <option value="weight-desc">Weight</option>
      </select>

      <button id="random">Random</button>
    </section>


    <main>
      <table id="pokemon-table">
        <thead>
          <tr>
            <h>Sprite</h>
            <h>ID</h>
            <h>Name</h>
            <h>Types</h>
            <h>Height</h>
            <h>Weight</h>
            <h>Actions</h>
          </tr>
        </thead>
        <tbody id="table-body">

        </tbody>
      </table>
      <div id="loadingIndicator"></div>
      <div id="infinite-scroll"></div>
    </main>



    <h3>Results:</h3>
    <div id="resultsDisplay"></div>

    <aside class="favourites">
      <h3>My favourites</h3>
      <div id="favourites-list">
        <p class="fav-empty">No favourites saved</p>
      </div>
    </aside>

    </div>
    


    <script type="module" src="/src/main.js"></script>
  </body>
</html>
