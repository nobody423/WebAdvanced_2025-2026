<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webadvanced</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="app"></div>

    <h1>Pokemon API</h1>

    <button id="all">See all</button>

    <input type="text" id="pokemonName" placeholder="Enter pokemon name">
    <button onclick="fetchPokemon()">Fetch pokemon</button><br>

    <img src="" alt="Pokemon Sprite" id="pokemonSprite" style="display: none">

    <p>choose by: </p>
    <ul>

      <label for="berries" onclick="">Berries</label>
      <select name="berries" id="berries">
        <option value="berries">berries</option>
        <option value="berry firmnesses">berry firmnesses</option>
        <option value="berry flavors">berry flavors</option>
      </select>

      <label for="contests">Contests</label>
      <select name="contests" id="contests">
        <option value="contest types">contest types</option>
        <option value="contest effects">contest effects</option>
        <option value="super contest effects">super contest effects</option>
      </select>


      <label for="encounters">Encounters</label>
      <select name="encounters" id="encounters">
        <option value="encounter methods">encounter methods</option>
        <option value="encounter conditions">encounter conditions</option>
        <option value="encounter condition values">encounter condition values</option>
      </select>

      <label for="evolution">Evolution</label>
      <select name="evolution" id="evolution">
        <option value="Evolution chains">Evolution chains</option>
        <option value="Evolution triggers">Evolution triggers</option>
      </select>

      <label for="games">Games</label>
      <select name="games" id="games">
        <option value="Generations">Generations</option>
        <option value="Pokedexes">Pokedexes</option>
        <option value="Version">Version</option>
        <option value="Version groups">Version groups</option>
      </select>

      <label for="items">Items</label>
      <select name="item" id="item">
        <option value="Item">Item</option>
        <option value="Item attributes">Item attributes</option>
        <option value="Item categories">Item categories</option>
        <option value="Item fling effects">Item fling effects</option>
        <option value="Item pockets">Item pockets</option>
      </select>

      <label for="locations">Locations</labels>
        <select name="Locations" id="Locations">
          <option value="Locations">Locations</option>
          <option value="Location areas">Location areas</option>
          <option value="Pal park areas">Pal park areas</option>
          <option value="Regions">Regions</option>
        </select>

    </ul>
    




    <script type="module" src="/src/main.ts"></script>
    <script src="script.js"></script>
  </body>
</html>
